<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | Resumora AI</title>

<link rel="stylesheet" href="css/dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

.profile-card{
    width:420px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    text-align:center;
}

.profile-card img{
    width:120px;
    height:120px;
    border-radius:50%;
    margin-bottom:20px;
}

.profile-card h2{
    color:#4f46e5;
}

.profile-card p{
    font-size:18px;
    margin:12px 0;
}

.profile-card button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#4f46e5;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.profile-card button:hover{
    background:#3730a3;
}

</style>

</head>

<body>

<div class="profile-card">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<h2>Shyamini</h2>

<p><strong>Email:</strong> shyamini@example.com</p>

<p><strong>Course:</strong> B.Sc Computer Science</p>

<p><strong>Project:</strong> Resumora AI</p>

<p><strong>Role:</strong> Student</p>

<button onclick="location.href='dashboard.html'">

⬅ Back to Dashboard

</button>

</div>

</body>

</html>
